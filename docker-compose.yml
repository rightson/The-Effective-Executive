services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ee
      POSTGRES_PASSWORD: ee
      POSTGRES_DB: effective_executive
    ports:
      - "5432:5432"
    volumes:
      - ee_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ee -d effective_executive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ee_pg_data:
